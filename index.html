<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Saumya | Happy Women's Day</title>
    <style>
        :root {
            --deep-rose: #d63384;
            --soft-pink: #ff85a1;
            --lily-white: #fffafa;
            --leaf-green: #2d5a27;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            background: #fdf2f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            animation: fadeIn 2s ease;
        }

        h1 {
            color: #8a2b4a;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Bouquet Stage */
        .stage {
            position: relative;
            width: 600px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .flower {
            position: absolute;
            transform-origin: bottom center;
            animation: grow 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        /* Leaves */
        .leaf {
            fill: var(--leaf-green);
            filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2));
        }

        /* Compliment Card */
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            max-width: 450px;
            text-align: center;
            margin: 30px;
            border: 1px solid #f9dbe4;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1s ease forwards 1s;
        }

        .card p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            font-style: italic;
        }

        .highlight {
            color: var(--deep-rose);
            font-weight: bold;
            display: block;
            margin-top: 10px;
            font-size: 1.3rem;
        }

        @keyframes grow {
            from { transform: scale(0) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* Subtle swaying animation */
        .sway {
            animation: swaying 4s ease-in-out infinite alternate;
        }

        @keyframes swaying {
            from { transform: rotate(-1deg); }
            to { transform: rotate(1deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Happy Women's Day</h1>
    </div>

    <div class="stage" id="stage">
        </div>

    <div class="card">
        <p>
            Saumya, your favorite flowers represent grace and beauty, but neither of them can match your radiance. 
            <span class="highlight">Your smile is genuinely breathtaking.</span>
            The world is a much warmer place when you let us see it. Keep shining!
        </p>
    </div>

    <script>
        const stage = document.getElementById('stage');

        const createRoseSVG = (x, y, delay) => {
            return `
            <div class="flower sway" style="left:${x}px; bottom:${y}px; animation-delay:${delay}s; z-index: 2;">
                <svg width="120" height="180" viewBox="0 0 100 150">
                    <path class="leaf" d="M50 100 Q30 80 20 100 Q30 120 50 105" transform="rotate(-20 50 105)"/>
                    <path class="leaf" d="M50 100 Q70 80 80 100 Q70 120 50 105" transform="rotate(20 50 105)"/>
                    <path d="M50 150 Q55 120 50 100" stroke="#1b4332" stroke-width="3" fill="none"/>
                    <defs>
                        <radialGradient id="roseGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" style="stop-color:#ffb3c1" />
                            <stop offset="70%" style="stop-color:#ff4d6d" />
                            <stop offset="100%" style="stop-color:#c9184a" />
                        </radialGradient>
                    </defs>
                    <g transform="translate(50, 85)">
                        <circle r="25" fill="url(#roseGrad)" />
                        <path d="M-25 0 C-40 -30 40 -30 25 0" fill="#ff758f" opacity="0.8"/>
                        <path d="M-20 5 C-30 -15 30 -15 20 5" fill="#ff8fa3" />
                        <path d="M-10 0 A10 10 0 1 1 10 0 A10 10 0 1 1 -10 0" fill="#a4133c" transform="scale(0.6)"/>
                    </g>
                </svg>
            </div>`;
        }

        const createLilySVG = (x, y, delay) => {
            return `
            <div class="flower sway" style="left:${x}px; bottom:${y}px; animation-delay:${delay}s; z-index: 1;">
                <svg width="140" height="200" viewBox="0 0 100 150">
                    <path d="M50 150 Q45 120 50 100" stroke="#1b4332" stroke-width="2" fill="none"/>
                    <g transform="translate(50, 80)">
                        <path d="M0 0 Q-20 -50 0 -70 Q20 -50 0 0" fill="#fff5f7" stroke="#ffe5ec" />
                        <path d="M0 0 Q-50 -20 -70 0 Q-50 20 0 0" fill="#fff5f7" stroke="#ffe5ec" />
                        <path d="M0 0 Q50 -20 70 0 Q50 20 0 0" fill="#fff5f7" stroke="#ffe5ec" />
                        <path d="M0 0 Q-30 40 0 60 Q30 40 0 0" fill="#fff5f7" stroke="#ffe5ec" />
                        <circle r="4" fill="#ffb3c1" />
                        <path d="M-2 -5 L-5 -15" stroke="#ff85a1" stroke-width="1"/>
                        <path d="M2 -5 L5 -15" stroke="#ff85a1" stroke-width="1"/>
                    </g>
                </svg>
            </div>`;
        }

        // Build the arrangement
        let bouquetHTML = '';
        // Background Lilies
        bouquetHTML += createLilySVG(100, 20, 0.5);
        bouquetHTML += createLilySVG(300, 25, 0.8);
        
        // Foreground Roses
        bouquetHTML += createRoseSVG(160, 10, 0.2);
        bouquetHTML += createRoseSVG(240, 5, 0.4);
        bouquetHTML += createRoseSVG(340, 15, 0.7);

        stage.innerHTML = bouquetHTML;
    </script>
</body>
</html>
